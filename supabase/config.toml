# Supabase CLI config for local dev: `supabase start`
# https://supabase.com/docs/guides/cli/config
project_id = "engram"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.claude-insight]
verify_jwt = true

[functions.stripe-checkout]
verify_jwt = true

[functions.stripe-portal]
verify_jwt = true

[functions.stripe-webhook]
verify_jwt = false
