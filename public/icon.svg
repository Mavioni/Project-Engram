<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1a32"/>
      <stop offset="60%" stop-color="#0b0b17"/>
      <stop offset="100%" stop-color="#06060e"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="30%" stop-color="#ff8cc6"/>
      <stop offset="65%" stop-color="#7eb5ff"/>
      <stop offset="100%" stop-color="#0b0b17"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7eb5ff"/>
      <stop offset="50%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- outer ring -->
  <circle cx="256" cy="256" r="188" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.55"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.12"/>

  <!-- spokes (24 facets) -->
  <g stroke="url(#ring)" stroke-width="1.1" opacity="0.35">
    <!-- generated as 24 radial lines at 15° each -->
    <g transform="translate(256 256)">
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(0)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(15)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(30)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(45)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(60)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(75)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(90)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(105)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(120)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(135)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(150)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(165)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(180)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(195)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(210)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(225)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(240)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(255)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(270)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(285)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(300)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(315)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(330)"/>
      <line x1="0" y1="0" x2="0" y2="-168" transform="rotate(345)"/>
    </g>
  </g>

  <!-- iris disk -->
  <circle cx="256" cy="256" r="120" fill="url(#iris)" filter="url(#glow)"/>
  <!-- pupil -->
  <circle cx="256" cy="256" r="38" fill="#06060e"/>
  <circle cx="256" cy="256" r="30" fill="#0b0b17" stroke="#ffd166" stroke-width="1" opacity="0.5"/>
  <!-- catchlight -->
  <circle cx="240" cy="240" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="232" cy="248" r="3" fill="#ffffff" opacity="0.6"/>
</svg>
