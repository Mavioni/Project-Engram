# Engram — Netlify configuration
# Primary deploy path for this repo is Netlify Drop:
#   1. npm ci && npm run build
#   2. Drag the `dist/` folder onto https://app.netlify.com/drop
# This file is also used if you later connect Git-based deploys.

[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

# Single-page app: every route serves index.html and lets React Router handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers — Play Store / TWA review likes these.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Digital Asset Links must be served as application/json with CORS open for TWA verification.
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=60"

# Long-cache hashed build assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
