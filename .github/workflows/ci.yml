name: CI

# Lint + build check. Runs on every push and PR.
# Deploy is a separate workflow (deploy.yml) that only runs on main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      # Doc drift guard — fails if README auto-sections don't match
      # the current codebase. Run `npm run docs:update` locally to fix.
      # Runs BEFORE build because `prebuild` regenerates docs itself.
      - name: Docs up-to-date check
        run: npm run docs:check

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
