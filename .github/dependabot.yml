version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Version ceilings for packages blocked by ecosystem peers.
    # Revisit these when the named downstream dep releases support.
    ignore:
      # vite-plugin-pwa@1.2.0 only supports vite up to ^7.
      - dependency-name: vite
        versions: ['>=8']
      # @vitejs/plugin-react@6 requires vite@8, so cap at 5.x while
      # vite-plugin-pwa still blocks vite@8.
      - dependency-name: '@vitejs/plugin-react'
        versions: ['>=6']
      # eslint-plugin-react@7.37.5 only supports eslint up to ^9.7.
      - dependency-name: eslint
        versions: ['>=10']
      - dependency-name: '@eslint/js'
        versions: ['>=10']
    groups:
      react:
        patterns: ['react', 'react-*', '@types/react*']
      vite:
        patterns: ['vite', '@vitejs/*', 'vite-plugin-*']
      supabase:
        patterns: ['@supabase/*']
      dev-tooling:
        patterns: ['eslint*', 'prettier', 'sharp']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
